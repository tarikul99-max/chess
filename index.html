<!DOCTYPE html>
<html>
<head>
    <title>JS Chess Game</title>
    <style>
        body { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #2c3e50; color: white; font-family: sans-serif; }
        canvas { border: 5px solid #34495e; cursor: pointer; }
    </style>
</head>
<body>
    <h2>JavaScript Chess</h2>
    <canvas id="chessBoard" width="400" height="400"></canvas>
    <p id="status">একটি গুটি সিলেক্ট করুন</p>

    <script>
        const canvas = document.getElementById("chessBoard");
        const ctx = canvas.getContext("2d");
        const size = 50;
        let selected = null;

        const pieces = { 'r': '♜', 'n': '♞', 'b': '♝', 'q': '♛', 'k': '♚', 'p': '♟', 'R': '♖', 'N': '♘', 'B': '♗', 'Q': '♕', 'K': '♔', 'P': '♙' };

        let board = [
            ['r', 'n', 'b', 'q', 'k', 'b', 'n', 'r'],
            ['p', 'p', 'p', 'p', 'p', 'p', 'p', 'p'],
            [null, null, null, null, null, null, null, null],
            [null, null, null, null, null, null, null, null],
            [null, null, null, null, null, null, null, null],
            [null, null, null, null, null, null, null, null],
            ['P', 'P', 'P', 'P', 'P', 'P', 'P', 'P'],
            ['R', 'N', 'B', 'Q', 'K', 'B', 'N', 'R']
        ];

        function draw() {
            ctx.font = "40px Arial";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";

            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    ctx.fillStyle = (r + c) % 2 === 0 ? "#f0d9b5" : "#b58863";
                    ctx.fillRect(c * size, r * size, size, size);

                    let p = board[r][c];
                    if (p) {
                        ctx.fillStyle = (p === p.toUpperCase()) ? "white" : "black";
                        ctx.fillText(pieces[p], c * size + size/2, r * size + size/2);
                    }
                }
            }
        }

        canvas.addEventListener("mousedown", (e) => {
            const rect = canvas.getBoundingClientRect();
            let c = Math.floor((e.clientX - rect.left) / size);
            let r = Math.floor((e.clientY - rect.top) / size);

            if (selected) {
                board[r][c] = selected.piece;
                board[selected.r][selected.c] = null;
                selected = null;
            } else if (board[r][c]) {
                selected = { r, c, piece: board[r][c] };
            }
            draw();
        });

        draw();
    </script>
</body>
</html>
