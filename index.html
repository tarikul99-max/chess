<!DOCTYPE html>
<html>
<head>
    <title>Chess Board Setup</title>
    <style>
        body { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #2c3e50; font-family: Arial; }
        canvas { border: 5px solid #34495e; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
    </style>
</head>
<body>
    <canvas id="chessBoard" width="400" height="400"></canvas>

    <script>
        const canvas = document.getElementById("chessBoard");
        const ctx = canvas.getContext("2d");
        const size = 50;

        // গুটিগুলোর ইউনিকোড (Unicode)
        const pieceSymbols = {
            'r': '♜', 'n': '♞', 'b': '♝', 'q': '♛', 'k': '♚', 'p': '♟',
            'R': '♖', 'N': '♘', 'B': '♗', 'Q': '♕', 'K': '♔', 'P': '♙'
        };

        // বোর্ডের প্রাথমিক পজিশন (এভাবেই বোর্ড সাজানো থাকবে)
        const board = [
            ['r', 'n', 'b', 'q', 'k', 'b', 'n', 'r'],
            ['p', 'p', 'p', 'p', 'p', 'p', 'p', 'p'],
            [null, null, null, null, null, null, null, null],
            [null, null, null, null, null, null, null, null],
            [null, null, null, null, null, null, null, null],
            [null, null, null, null, null, null, null, null],
            ['P', 'P', 'P', 'P', 'P', 'P', 'P', 'P'],
            ['R', 'N', 'B', 'Q', 'K', 'B', 'N', 'R']
        ];

        function drawBoard() {
            ctx.font = "40px Arial";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";

            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    // ঘর রঙ করা
                    ctx.fillStyle = (r + c) % 2 === 0 ? "#f0d9b5" : "#b58863";
                    ctx.fillRect(c * size, r * size, size, size);

                    // গুটি বসানো
                    let p = board[r][c];
                    if (p) {
                        ctx.fillStyle = (p === p.toUpperCase()) ? "white" : "black";
                        ctx.fillText(pieceSymbols[p], c * size + size/2, r * size + size/2);
                    }
                }
            }
        }

        drawBoard();
    </script>
</body>
</html>
